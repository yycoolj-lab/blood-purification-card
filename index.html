<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>血液淨化成效圖卡 — 俠醫楊智鈞</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: #EEF2EF;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 32px;
      background: #2D5F4A;
      flex-shrink: 0;
    }
    .brand-bar { width: 4px; height: 28px; background: #C0392B; border-radius: 2px; }
    .app-header h1 { font-family: "Noto Serif TC", serif; font-size: 20px; color: #fff; font-weight: 700; }
    .app-header p { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    .app-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ─── Form ─── */
    .form-panel {
      width: 380px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #D8E4DE;
      overflow-y: auto;
      padding: 24px 22px 40px;
    }

    .form-section { margin-bottom: 24px; }

    .section-title {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #2D5F4A;
      font-weight: 700;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #2D5F4A;
    }

    .field-row { display: grid; gap: 8px; margin-bottom: 8px; }
    .field-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .field-row.cols-1 { grid-template-columns: 1fr; }

    label {
      display: block;
      font-size: 10px;
      color: #6B8070;
      margin-bottom: 3px;
      font-weight: 500;
    }

    input[type="text"], input[type="number"], input[type="date"] {
      width: 100%;
      background: #F5FAF7;
      border: 1px solid #C8DDD4;
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 14px;
      color: #1A1A1A;
      font-family: "Noto Sans TC", sans-serif;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: #2D5F4A; }
    input::placeholder { color: #B0C4B8; }

    .ind-block {
      background: #F5FAF7;
      border: 1px solid #C8DDD4;
      border-radius: 7px;
      padding: 10px 12px 12px;
      margin-bottom: 8px;
    }

    .ind-block-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .ind-label { font-size: 13px; font-weight: 700; color: #2D5F4A; }
    .ind-unit-tag {
      font-size: 10px;
      color: #7A9A87;
      background: #DAE9E1;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .ind-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* ─── Preview ─── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #E4EBE5;
      overflow: auto;
      padding: 24px 32px 40px;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .fmt-btn {
      padding: 8px 18px;
      background: #fff;
      border: 1.5px solid #B0C8BA;
      border-radius: 5px;
      color: #4A7A5C;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .fmt-btn.active { background: #2D5F4A; border-color: #2D5F4A; color: #fff; }

    .dl-btn {
      padding: 9px 24px;
      background: #C0392B;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .dl-btn:hover { background: #A93226; }

    #previewCanvas {
      display: block;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
    }

    .preview-hint { margin-top: 14px; font-size: 11px; color: #8AAA94; text-align: center; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #B0C8BA; border-radius: 2px; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="brand-bar"></div>
  <div>
    <h1>血液淨化成效圖卡產生器</h1>
    <p>輸入治療前後數值，即時預覽並下載高畫質圖卡</p>
  </div>
</header>

<div class="app-body">

  <aside class="form-panel">

    <div class="form-section">
      <div class="section-title">基本資訊</div>
      <div class="field-row cols-1">
        <div><label>治療項目名稱</label>
        <input type="text" id="treatmentName" value="血液淨化" placeholder="例：DFPP 血漿雙重過濾"></div>
      </div>
      <div class="field-row cols-2">
        <div><label>患者姓名（可略）</label>
        <input type="text" id="patientName" placeholder="王先生"></div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">血脂肪</div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">總膽固醇 TC</span>
          <span class="ind-unit-tag">mg/dL</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="tc" data-field="before" placeholder="245" step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="tc" data-field="after"  placeholder="185" step="1" min="0"></div>
        </div>
      </div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">低密度脂蛋白 LDL-C</span>
          <span class="ind-unit-tag">mg/dL</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="ldl" data-field="before" placeholder="165" step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="ldl" data-field="after"  placeholder="110" step="1" min="0"></div>
        </div>
      </div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">三酸甘油脂 TG</span>
          <span class="ind-unit-tag">mg/dL</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="tg" data-field="before" placeholder="320" step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="tg" data-field="after"  placeholder="185" step="1" min="0"></div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">肝功能</div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">AST（GOT）</span>
          <span class="ind-unit-tag">U/L</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="ast" data-field="before" placeholder="85"  step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="ast" data-field="after"  placeholder="35"  step="1" min="0"></div>
        </div>
      </div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">ALT（GPT）</span>
          <span class="ind-unit-tag">U/L</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="alt" data-field="before" placeholder="120" step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="alt" data-field="after"  placeholder="42"  step="1" min="0"></div>
        </div>
      </div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">γ-GT</span>
          <span class="ind-unit-tag">U/L</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="ggt" data-field="before" placeholder="95"  step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="ggt" data-field="after"  placeholder="45"  step="1" min="0"></div>
        </div>
      </div>
    </div>

  </aside>

  <main class="preview-panel">
    <div class="preview-toolbar">
      <button class="fmt-btn active" id="btn11" onclick="setFormat('1:1')">1:1 方形</button>
      <button class="fmt-btn"        id="btn45" onclick="setFormat('4:5')">4:5 直式</button>
      <button class="dl-btn" onclick="downloadCard()">下載圖卡 PNG</button>
    </div>
    <canvas id="previewCanvas"></canvas>
    <p class="preview-hint">輸出解析度 1080px — 適用 Instagram / Facebook / LINE 分享</p>
  </main>

</div>

<script>
// ─── Indicators (fixed, no toggle needed) ─────────────────────
const INDICATORS = [
  { key: 'tc',  label: '總膽固醇 TC',   unit: 'mg/dL', dir: 'down', section: '血脂肪' },
  { key: 'ldl', label: 'LDL-C',        unit: 'mg/dL', dir: 'down', section: '血脂肪' },
  { key: 'tg',  label: '三酸甘油脂 TG', unit: 'mg/dL', dir: 'down', section: '血脂肪' },
  { key: 'ast', label: 'AST（GOT）',    unit: 'U/L',   dir: 'down', section: '肝功能' },
  { key: 'alt', label: 'ALT（GPT）',    unit: 'U/L',   dir: 'down', section: '肝功能' },
  { key: 'ggt', label: 'γ-GT',         unit: 'U/L',   dir: 'down', section: '肝功能' },
];

const SECTIONS = ['血脂肪', '肝功能'];

// ─── Colors ──────────────────────────────────────────────────
const C = {
  green:     '#2D5F4A',
  greenDark: '#1E4535',
  greenLight:'#EBF5EE',
  white:     '#FFFFFF',
  text:      '#1A2820',
  textLight: '#7A9A87',
  border:    '#D0DDD6',
  red:       '#C0392B',
  good:      '#1A6B3A',
  goodBg:    '#E4F5EB',
  bad:       '#B52D20',
  badBg:     '#FDECEA',
  rowAlt:    '#F7FBF8',
};

let currentFormat = '1:1';

function getData() {
  const vals = {};
  INDICATORS.forEach(({ key }) => {
    const b = document.querySelector(`input[data-key="${key}"][data-field="before"]`);
    const a = document.querySelector(`input[data-key="${key}"][data-field="after"]`);
    vals[key] = {
      before: b && b.value !== '' ? parseFloat(b.value) : null,
      after:  a && a.value !== '' ? parseFloat(a.value) : null,
    };
  });
  return {
    treatmentName: document.getElementById('treatmentName').value.trim() || '血液淨化',
    patientName:   document.getElementById('patientName').value.trim(),
    vals,
  };
}

function fmtVal(v) {
  if (v === null) return '—';
  return v < 10 ? v.toFixed(1) : Math.round(v).toString();
}

function calcPct(before, after, dir) {
  if (before === null || after === null || before === 0) return null;
  const pct = ((after - before) / before) * 100;
  const improved = dir === 'up' ? pct > 0 : pct < 0;
  return { pct: Math.abs(pct), improved, arrow: pct < 0 ? '↓' : '↑' };
}

// ─── Canvas Helpers ───────────────────────────────────────────
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ─── Draw Card ───────────────────────────────────────────────
function drawCard(canvas, fmt) {
  const W = 1080;
  const H = fmt === '4:5' ? 1350 : 1080;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const d = getData();

  // White background
  ctx.fillStyle = C.white;
  ctx.fillRect(0, 0, W, H);

  // ── Header ──
  const HH = 96;
  ctx.fillStyle = C.green;
  ctx.fillRect(0, 0, W, HH);
  ctx.fillStyle = C.red;
  ctx.fillRect(0, 0, 8, HH);

  // Clinic name
  ctx.font = '500 17px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('富足診所', 30, HH / 2 - 16);

  // Treatment title
  ctx.font = '700 38px "Noto Serif TC", serif';
  ctx.fillStyle = C.white;
  ctx.fillText(d.treatmentName + '  成效報告', 30, HH / 2 + 16);

  // Right: patient name
  if (d.patientName) {
    ctx.textAlign = 'right';
    ctx.font = '700 20px "Noto Sans TC", sans-serif';
    ctx.fillStyle = C.white;
    ctx.fillText(d.patientName, W - 32, HH / 2 + 4);
    ctx.textAlign = 'left';
  }

  // ── Column header bar ──
  const PAD = 32;
  const COL = {
    label:  PAD,        labelEnd: 380,
    before: 380,        beforeEnd: 580,
    after:  580,        afterEnd:  780,
    badge:  780,        badgeEnd:  W - PAD,
  };

  const COLH = HH;
  const COLH_H = 50;
  ctx.fillStyle = C.greenLight;
  ctx.fillRect(0, COLH, W, COLH_H);

  ctx.font = '700 15px "Noto Sans TC", sans-serif';
  ctx.fillStyle = C.green;
  ctx.textBaseline = 'middle';
  const chY = COLH + COLH_H / 2;

  ctx.textAlign = 'left';
  ctx.fillText('指標', COL.label + 12, chY);
  ctx.textAlign = 'center';
  ctx.fillText('治療前', (COL.before + COL.beforeEnd) / 2, chY);
  ctx.fillText('治療後', (COL.after  + COL.afterEnd)  / 2, chY);
  ctx.fillText('改善幅度', (COL.badge + COL.badgeEnd) / 2, chY);
  ctx.textAlign = 'left';

  // Vertical dividers in col header
  [COL.before, COL.after, COL.badge].forEach(x => {
    ctx.fillStyle = C.border;
    ctx.fillRect(x, COLH, 1, COLH_H);
  });
  // Bottom line
  ctx.fillStyle = C.green;
  ctx.fillRect(0, COLH + COLH_H, W, 2);

  // ── Rows ──
  const FOOTER_H = 64;
  const contentStart = COLH + COLH_H + 2;
  const contentEnd   = H - FOOTER_H;
  const SH = 44; // section header height

  // Calculate row height
  const totalRows = INDICATORS.length;
  const totalSections = SECTIONS.length;
  const availForRows = contentEnd - contentStart - totalSections * SH;
  const ROW_H = Math.max(56, Math.min(fmt === '4:5' ? 110 : 90, Math.floor(availForRows / totalRows)));

  let y = contentStart;
  let rowIdx = 0;

  SECTIONS.forEach(sName => {
    const items = INDICATORS.filter(i => i.section === sName);

    // Section header
    ctx.fillStyle = C.greenDark;
    ctx.fillRect(0, y, W, SH);
    ctx.font = '700 14px "Noto Sans TC", sans-serif';
    ctx.fillStyle = C.white;
    ctx.textBaseline = 'middle';
    ctx.fillText('■  ' + sName, COL.label + 12, y + SH / 2);
    y += SH;

    items.forEach(item => {
      const ry = y;
      const cy = ry + ROW_H / 2;
      const v  = d.vals[item.key];

      // Row bg
      ctx.fillStyle = rowIdx % 2 === 0 ? C.white : C.rowAlt;
      ctx.fillRect(0, ry, W, ROW_H);

      // Bottom border
      ctx.fillStyle = C.border;
      ctx.fillRect(0, ry + ROW_H - 1, W, 1);

      // Col dividers
      [COL.before, COL.after, COL.badge].forEach(x => {
        ctx.fillStyle = C.border;
        ctx.fillRect(x, ry, 1, ROW_H);
      });

      // Label
      const lsz = Math.min(21, ROW_H * 0.27);
      ctx.font = `600 ${lsz}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = C.text;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText(item.label, COL.label + 12, cy - 4);

      ctx.font = `400 12px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = C.textLight;
      ctx.fillText(item.unit, COL.label + 12, cy + lsz * 0.65);

      // Before
      const bSz = Math.min(24, ROW_H * 0.3);
      ctx.font = `400 ${bSz}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = v.before !== null ? '#4A6A58' : '#C8D8CC';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(fmtVal(v.before), (COL.before + COL.beforeEnd) / 2, cy);

      // After
      const aSz = Math.min(30, ROW_H * 0.36);
      ctx.font = `700 ${aSz}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = v.after !== null ? C.green : '#C8D8CC';
      ctx.fillText(fmtVal(v.after), (COL.after + COL.afterEnd) / 2, cy);

      // Badge
      const ch = calcPct(v.before, v.after, item.dir);
      const bcx = (COL.badge + COL.badgeEnd) / 2;
      if (ch) {
        const BW = 118, BH = Math.min(42, ROW_H * 0.52);
        ctx.fillStyle = ch.improved ? C.goodBg : C.badBg;
        rrect(ctx, bcx - BW / 2, cy - BH / 2, BW, BH, 7);
        ctx.fill();
        ctx.strokeStyle = ch.improved ? C.good : C.bad;
        ctx.lineWidth = 1.5;
        rrect(ctx, bcx - BW / 2, cy - BH / 2, BW, BH, 7);
        ctx.stroke();

        ctx.font = `700 ${Math.min(21, BH * 0.52)}px "Noto Sans TC", sans-serif`;
        ctx.fillStyle = ch.improved ? C.good : C.bad;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${ch.arrow} ${ch.pct.toFixed(1)}%`, bcx, cy + 1);
      } else {
        ctx.font = '400 20px "Noto Sans TC", sans-serif';
        ctx.fillStyle = '#C0C8C4';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('—', bcx, cy);
      }

      ctx.textAlign = 'left';
      y += ROW_H;
      rowIdx++;
    });
  });

  // Fill gap
  if (y < contentEnd) {
    ctx.fillStyle = C.white;
    ctx.fillRect(0, y, W, contentEnd - y);
  }
  ctx.fillStyle = C.border;
  ctx.fillRect(0, contentEnd, W, 1);

  // ── Footer ──
  const fy = H - FOOTER_H;
  ctx.fillStyle = C.green;
  ctx.fillRect(0, fy, W, FOOTER_H);
  ctx.fillStyle = C.red;
  ctx.fillRect(0, fy, 8, FOOTER_H);

  ctx.font = '400 15px "Noto Sans TC", sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillText('認同的話，幫我分享', 28, fy + FOOTER_H / 2);
  const sw = ctx.measureText('認同的話，幫我分享').width;
  ctx.fillStyle = '#FFB3AA';
  ctx.fillText(' ►►►', 28 + sw, fy + FOOTER_H / 2);

  ctx.textAlign = 'right';
  ctx.fillStyle = C.white;
  ctx.fillText('@俠醫楊智鈞', W - 28, fy + FOOTER_H / 2);
  ctx.textAlign = 'left';
}

// ─── Preview & Download ───────────────────────────────────────
const canvas = document.getElementById('previewCanvas');
const SCALE = 0.44;

function setFormat(f) {
  currentFormat = f;
  document.getElementById('btn11').classList.toggle('active', f === '1:1');
  document.getElementById('btn45').classList.toggle('active', f === '4:5');
  redraw();
}

async function redraw() {
  await document.fonts.ready;
  drawCard(canvas, currentFormat);
  canvas.style.width  = (canvas.width  * SCALE) + 'px';
  canvas.style.height = (canvas.height * SCALE) + 'px';
}

async function downloadCard() {
  await document.fonts.ready;
  const exp = document.createElement('canvas');
  drawCard(exp, currentFormat);
  const name  = document.getElementById('patientName').value.trim();
  const fname = `血液淨化成效_${currentFormat.replace(':', 'x')}${name ? '_' + name : ''}.png`;
  exp.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname; a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

let t;
document.querySelectorAll('input').forEach(el =>
  el.addEventListener('input', () => { clearTimeout(t); t = setTimeout(redraw, 100); })
);


document.fonts.ready.then(redraw);
</script>
</body>
</html>
