<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>血液淨化成效圖卡 — 俠醫楊智鈞</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      touch-action: manipulation;
    }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: #EEF2EF;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-text-size-adjust: 100%;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 32px;
      background: #2D5F4A;
      flex-shrink: 0;
    }
    .brand-bar { width: 4px; height: 28px; background: #C0392B; border-radius: 2px; }
    .app-header h1 { font-family: "Noto Serif TC", serif; font-size: 20px; color: #fff; font-weight: 700; }
    .app-header p { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    .app-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ─── Form ─── */
    .form-panel {
      width: 380px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #D8E4DE;
      overflow-y: auto;
      padding: 24px 22px 40px;
    }

    .form-section { margin-bottom: 24px; }

    .section-title {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #2D5F4A;
      font-weight: 700;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #2D5F4A;
    }

    .field-row { display: grid; gap: 8px; margin-bottom: 8px; }
    .field-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .field-row.cols-1 { grid-template-columns: 1fr; }

    label {
      display: block;
      font-size: 10px;
      color: #6B8070;
      margin-bottom: 3px;
      font-weight: 500;
    }

    input[type="text"], input[type="number"], input[type="date"] {
      width: 100%;
      background: #F5FAF7;
      border: 1px solid #C8DDD4;
      border-radius: 5px;
      padding: 8px 10px;
      /* 16px 以上可避免 iOS Safari 點擊輸入時自動放大畫面 */
      font-size: 16px;
      color: #1A1A1A;
      font-family: "Noto Sans TC", sans-serif;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: #2D5F4A; }
    input::placeholder { color: #B0C4B8; }

    .ind-block {
      background: #F5FAF7;
      border: 1px solid #C8DDD4;
      border-radius: 7px;
      padding: 10px 12px 12px;
      margin-bottom: 8px;
    }

    .ind-block-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .ind-label { font-size: 13px; font-weight: 700; color: #2D5F4A; }
    .ind-unit-tag {
      font-size: 10px;
      color: #7A9A87;
      background: #DAE9E1;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .ind-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* ─── Preview ─── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #E4EBE5;
      overflow: auto;
      padding: 24px 32px 40px;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .fmt-btn {
      padding: 8px 18px;
      background: #fff;
      border: 1.5px solid #B0C8BA;
      border-radius: 5px;
      color: #4A7A5C;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .fmt-btn.active { background: #2D5F4A; border-color: #2D5F4A; color: #fff; }

    .dl-btn {
      padding: 9px 24px;
      background: #C0392B;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .dl-btn:hover { background: #A93226; }

    #previewCanvas {
      display: block;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
    }

    .preview-hint { margin-top: 14px; font-size: 11px; color: #8AAA94; text-align: center; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #B0C8BA; border-radius: 2px; }

    /* ─── Mobile / tablet (< 900px) ─── */
    @media (max-width: 900px) {
      body { height: auto; min-height: 100vh; }

      .app-body {
        flex-direction: column;
        overflow: visible;
      }

      /* Form on TOP on mobile */
      .form-panel {
        order: 1;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #C8DDD4;
        overflow-y: visible;
        padding: 20px 16px 28px;
      }

      /* Preview below (scroll down to see/download) */
      .preview-panel {
        order: 2;
        width: 100%;
        max-width: 100%;
        padding: 20px 12px 40px;
      }

      .preview-toolbar {
        margin-bottom: 14px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .fmt-btn, .dl-btn { font-size: 14px; padding: 9px 16px; }
      .dl-btn { padding: 11px 22px; font-size: 15px; }

      #previewCanvas {
        max-width: 100%;
        height: auto !important;
        width: auto !important;
      }

      .preview-hint { font-size: 11px; margin-top: 10px; }

      .app-header { padding: 14px 20px; }
      .app-header h1 { font-size: 17px; }
      .app-header p { font-size: 11px; }
    }

    /* Phones (< 480px): even tighter */
    @media (max-width: 480px) {
      .ind-inputs { grid-template-columns: 1fr 1fr; gap: 6px; }
      .ind-block { padding: 8px 10px 10px; }
      .preview-panel { padding: 16px 8px 32px; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="brand-bar"></div>
  <div>
    <h1>血液淨化成效圖卡產生器</h1>
    <p>輸入治療前後數值，即時預覽並下載高畫質圖卡</p>
  </div>
</header>

<div class="app-body">

  <aside class="form-panel">

    <div class="form-section">
      <div class="section-title">基本資訊</div>
      <div class="field-row cols-1">
        <div><label>治療項目名稱</label>
        <input type="text" id="treatmentName" value="血液淨化體內大掃除" placeholder="例：DFPP 血漿雙重過濾"></div>
      </div>
      <div class="field-row cols-2">
        <div><label>患者姓名（可略）</label>
        <input type="text" id="patientName" placeholder="王先生"></div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">血脂肪</div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">總膽固醇 TC</span>
          <span class="ind-unit-tag">mg/dL</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="tc" data-field="before" placeholder="245" step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="tc" data-field="after"  placeholder="185" step="1" min="0"></div>
        </div>
      </div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">低密度脂蛋白 LDL-C</span>
          <span class="ind-unit-tag">mg/dL</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="ldl" data-field="before" placeholder="165" step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="ldl" data-field="after"  placeholder="110" step="1" min="0"></div>
        </div>
      </div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">三酸甘油脂 TG</span>
          <span class="ind-unit-tag">mg/dL</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="tg" data-field="before" placeholder="320" step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="tg" data-field="after"  placeholder="185" step="1" min="0"></div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">肝功能</div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">AST（GOT）</span>
          <span class="ind-unit-tag">U/L</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="ast" data-field="before" placeholder="85"  step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="ast" data-field="after"  placeholder="35"  step="1" min="0"></div>
        </div>
      </div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">ALT（GPT）</span>
          <span class="ind-unit-tag">U/L</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="alt" data-field="before" placeholder="120" step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="alt" data-field="after"  placeholder="42"  step="1" min="0"></div>
        </div>
      </div>

      <div class="ind-block">
        <div class="ind-block-head">
          <span class="ind-label">γ-GT</span>
          <span class="ind-unit-tag">U/L</span>
        </div>
        <div class="ind-inputs">
          <div><label>治療前</label><input type="number" data-key="ggt" data-field="before" placeholder="95"  step="1" min="0"></div>
          <div><label>治療後</label><input type="number" data-key="ggt" data-field="after"  placeholder="45"  step="1" min="0"></div>
        </div>
      </div>
    </div>

  </aside>

  <main class="preview-panel">
    <div class="preview-toolbar">
      <button class="fmt-btn active" id="btn11" onclick="setFormat('1:1')">1:1 方形</button>
      <button class="fmt-btn"        id="btn45" onclick="setFormat('4:5')">4:5 直式</button>
      <button class="dl-btn" onclick="downloadCard()">下載圖卡 PNG</button>
    </div>
    <canvas id="previewCanvas"></canvas>
    <p class="preview-hint">輸出解析度 1080px — 適用 Instagram / Facebook / LINE 分享</p>
  </main>

</div>

<script>
// ─── Indicators (fixed, no toggle needed) ─────────────────────
const INDICATORS = [
  { key: 'tc',  label: '總膽固醇 TC',   unit: 'mg/dL', dir: 'down', section: '血脂肪', dot: '#7FD5CE' },
  { key: 'ldl', label: 'LDL-C',        unit: 'mg/dL', dir: 'down', section: '血脂肪', dot: '#A5E0DA' },
  { key: 'tg',  label: '三酸甘油脂 TG', unit: 'mg/dL', dir: 'down', section: '血脂肪', dot: '#B7DFEA' },
  { key: 'ast', label: 'AST（GOT）',    unit: 'U/L',   dir: 'down', section: '肝功能', dot: '#A8D8C0' },
  { key: 'alt', label: 'ALT（GPT）',    unit: 'U/L',   dir: 'down', section: '肝功能', dot: '#C9E4C5' },
  { key: 'ggt', label: 'γ-GT',         unit: 'U/L',   dir: 'down', section: '肝功能', dot: '#D8EBD0' },
];

const SECTIONS = [
  { name: '血脂肪', icon: '💧', bg: '#E0F5F3', fg: '#2B8680' },
  { name: '肝功能', icon: '🌿', bg: '#E3F1E6', fg: '#3F8A6A' },
];

// ─── Colors (Tiffany blue + 富足品牌綠) ────────────────────────
const C = {
  bg:          '#F5FBFA',   // very soft tiffany cream
  white:       '#FFFFFF',
  cardShadow:  'rgba(10, 160, 150, 0.15)',

  tiff:        '#81D8D0',
  tiffDark:    '#0ABAB5',
  tiffDeep:    '#0A8B88',
  tiffSoft:    '#E0F5F3',
  tiffTint:    '#F0FAF9',

  brandGreen:  '#2D5F4A',   // 富足品牌深綠
  brandGold:   '#D4A863',   // 富足品牌金

  mint:        '#85D4B2',
  mintDark:    '#3F9573',
  mintSoft:    '#DFF3E8',

  butter:      '#FFE89E',
  butterSoft:  '#FFF4D2',
  butterDark:  '#B08820',

  text:        '#3A5558',
  textLight:   '#8CA4A8',
  border:      '#D8ECE9',
  borderSoft:  '#EAF5F3',

  good:        '#0A8B88',
  goodBg:      '#E0F5F3',
  bad:         '#E08090',
  badBg:       '#FFE4EA',

  // legacy aliases
  green:       '#0A8B88',
  greenDark:   '#076A68',
  greenLight:  '#E0F5F3',
  red:         '#D56A87',
  rowAlt:      '#F5FBFA',
};

// ─── Logo image preload ───────────────────────────────────────
const logoImg = new Image();
let logoReady = false;
const logoPromise = new Promise(res => {
  logoImg.onload  = () => { logoReady = true; res(); };
  logoImg.onerror = () => { res(); };
  logoImg.src = 'logo.png';
});

let currentFormat = '1:1';

function getData() {
  const vals = {};
  INDICATORS.forEach(({ key }) => {
    const b = document.querySelector(`input[data-key="${key}"][data-field="before"]`);
    const a = document.querySelector(`input[data-key="${key}"][data-field="after"]`);
    vals[key] = {
      before: b && b.value !== '' ? parseFloat(b.value) : null,
      after:  a && a.value !== '' ? parseFloat(a.value) : null,
    };
  });
  return {
    treatmentName: document.getElementById('treatmentName').value.trim() || '血液淨化體內大掃除',
    patientName:   document.getElementById('patientName').value.trim(),
    vals,
  };
}

function fmtVal(v) {
  if (v === null) return '—';
  return v < 10 ? v.toFixed(1) : Math.round(v).toString();
}

function calcPct(before, after, dir) {
  if (before === null || after === null || before === 0) return null;
  const pct = ((after - before) / before) * 100;
  const improved = dir === 'up' ? pct > 0 : pct < 0;
  return { pct: Math.abs(pct), improved, arrow: pct < 0 ? '↓' : '↑' };
}

// ─── Canvas Helpers ───────────────────────────────────────────
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ─── Draw Card ───────────────────────────────────────────────
function drawCard(canvas, fmt) {
  const W = 1080;
  const H = fmt === '4:5' ? 1350 : 1080;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const d = getData();

  // Outer cream bg
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle polka dot decoration
  ctx.fillStyle = 'rgba(10, 186, 181, 0.08)';
  for (let py = 30; py < H; py += 80) {
    for (let px = (py % 160 === 0 ? 30 : 70); px < W; px += 80) {
      ctx.beginPath();
      ctx.arc(px, py, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Main rounded card
  const M = 28;                      // outer margin
  const CR = 40;                     // card radius
  const CX = M, CY = M, CW = W - M*2, CH = H - M*2;

  // Drop shadow
  ctx.fillStyle = C.cardShadow;
  rrect(ctx, CX + 3, CY + 8, CW, CH, CR);
  ctx.fill();

  // Card surface
  ctx.fillStyle = C.white;
  rrect(ctx, CX, CY, CW, CH, CR);
  ctx.fill();

  // Clip to card for all inner content
  ctx.save();
  rrect(ctx, CX, CY, CW, CH, CR);
  ctx.clip();

  // ── Header block (Tiffany gradient) ──
  const HH = 170;
  const headerGrad = ctx.createLinearGradient(CX, CY, CX + CW, CY + HH);
  headerGrad.addColorStop(0, '#A8E4DF');
  headerGrad.addColorStop(1, '#81D8D0');
  ctx.fillStyle = headerGrad;
  ctx.fillRect(CX, CY, CW, HH);

  // Decorative circles in header
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  ctx.beginPath(); ctx.arc(CX + CW - 80, CY + 40, 22, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(CX + CW - 40, CY + 90, 12, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(CX + CW - 110, CY + 100, 8, 0, Math.PI*2); ctx.fill();

  // Logo on left
  const LOGO_SZ = 96;
  const LOGO_X = CX + 40;
  const LOGO_Y = CY + (HH - LOGO_SZ) / 2;
  if (logoReady) {
    // White rounded backdrop for logo
    ctx.fillStyle = '#FFFFFF';
    rrect(ctx, LOGO_X - 8, LOGO_Y - 8, LOGO_SZ + 16, LOGO_SZ + 16, 20);
    ctx.fill();
    ctx.drawImage(logoImg, LOGO_X, LOGO_Y, LOGO_SZ, LOGO_SZ);
  }

  // Title area (right of logo)
  const titleX = LOGO_X + LOGO_SZ + 28;

  // Clinic name small
  ctx.font = '600 20px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('♡ 富足診所 · 照顧心血管', titleX, CY + HH * 0.32);

  // Title
  ctx.font = '900 52px "Noto Serif TC", serif';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(d.treatmentName + '成效記錄', titleX, CY + HH * 0.68);

  // Patient name chip (top-right)
  if (d.patientName) {
    const pName = d.patientName;
    ctx.font = '600 20px "Noto Sans TC", sans-serif';
    const pw = ctx.measureText(pName).width + 40;
    const px = CX + CW - pw - 36;
    const py = CY + 24;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    rrect(ctx, px, py, pw, 36, 18);
    ctx.fill();
    ctx.fillStyle = C.tiffDeep;
    ctx.textAlign = 'center';
    ctx.fillText('👤 ' + pName, px + pw / 2, py + 18);
    ctx.textAlign = 'left';
  }

  // ── Column-header pills ──
  const PAD = 40;
  const COL = {
    label:  CX + PAD,      labelEnd: CX + 440,
    before: CX + 440,      beforeEnd: CX + 620,
    after:  CX + 620,      afterEnd:  CX + 800,
    badge:  CX + 800,      badgeEnd:  CX + CW - PAD + 10,
  };

  const COLH = CY + HH + 30;
  const COLH_H = 60;

  // "指標" label left
  ctx.font = '700 22px "Noto Sans TC", sans-serif';
  ctx.fillStyle = C.textLight;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('✎  指標', COL.label + 8, COLH + COLH_H / 2);

  // 3 pill chips
  const chipPills = [
    { key:'before', label:'治療前',  bg:'#F2E5D5', fg:'#A67332' },
    { key:'after',  label:'治療後',  bg:C.tiffSoft, fg:C.tiffDeep },
    { key:'badge',  label:'改善幅度', bg:'#FFF4D2', fg:C.butterDark },
  ];
  const CHIP_W = 160, CHIP_H = 48;
  chipPills.forEach(c => {
    const cxm = (COL[c.key] + COL[c.key + 'End']) / 2;
    ctx.fillStyle = c.bg;
    rrect(ctx, cxm - CHIP_W/2, COLH + (COLH_H - CHIP_H)/2, CHIP_W, CHIP_H, CHIP_H/2);
    ctx.fill();
    ctx.font = '700 22px "Noto Sans TC", sans-serif';
    ctx.fillStyle = c.fg;
    ctx.textAlign = 'center';
    ctx.fillText(c.label, cxm, COLH + COLH_H / 2);
  });
  ctx.textAlign = 'left';

  // ── Rows ──
  const FOOTER_H = 76;
  const contentStart = COLH + COLH_H + 14;
  const contentEnd   = CY + CH - FOOTER_H;
  const SH = 56;

  const totalRows = INDICATORS.length;
  const totalSections = SECTIONS.length;
  const availForRows = contentEnd - contentStart - totalSections * SH - 20;
  const ROW_H = Math.max(90, Math.min(fmt === '4:5' ? 140 : 120, Math.floor(availForRows / totalRows)));

  let y = contentStart;
  let rowIdx = 0;

  SECTIONS.forEach(sec => {
    const items = INDICATORS.filter(i => i.section === sec.name);

    // Section header as rounded pill
    const pillX = CX + PAD;
    const pillW = CW - PAD * 2;
    ctx.fillStyle = sec.bg;
    rrect(ctx, pillX, y + 4, pillW, SH - 8, (SH - 8)/2);
    ctx.fill();

    ctx.font = '800 26px "Noto Sans TC", sans-serif';
    ctx.fillStyle = sec.fg;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    ctx.fillText(sec.icon + '  ' + sec.name, pillX + 24, y + SH / 2);
    y += SH;

    items.forEach(item => {
      const ry = y + 4;
      const rh = ROW_H - 8;
      const cy = ry + rh / 2;
      const v  = d.vals[item.key];

      // Soft row card bg (alternating)
      const bg = rowIdx % 2 === 0 ? C.tiffTint : C.white;
      ctx.fillStyle = bg;
      rrect(ctx, CX + PAD, ry, CW - PAD*2, rh, 18);
      ctx.fill();

      // Colored left dot for indicator
      ctx.fillStyle = item.dot;
      ctx.beginPath();
      ctx.arc(CX + PAD + 26, cy, 10, 0, Math.PI * 2);
      ctx.fill();

      // Label
      const lsz = Math.min(34, rh * 0.32);
      ctx.font = `700 ${lsz}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = C.text;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText(item.label, CX + PAD + 52, cy - 8);

      ctx.font = `400 18px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = C.textLight;
      ctx.fillText(item.unit, CX + PAD + 52, cy + lsz * 0.65);

      // Before
      const bSz = Math.min(42, rh * 0.36);
      ctx.font = `500 ${bSz}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = v.before !== null ? '#8A9EA0' : '#D8E4E3';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(fmtVal(v.before), (COL.before + COL.beforeEnd) / 2, cy);

      // After (Tiffany highlight)
      const aSz = Math.min(54, rh * 0.44);
      ctx.font = `800 ${aSz}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = v.after !== null ? C.tiffDeep : '#D8E4E3';
      ctx.fillText(fmtVal(v.after), (COL.after + COL.afterEnd) / 2, cy);

      // Badge pill
      const ch = calcPct(v.before, v.after, item.dir);
      const bcx = (COL.badge + COL.badgeEnd) / 2;
      if (ch) {
        const BW = 200, BH = Math.min(64, rh * 0.56);
        ctx.fillStyle = ch.improved ? C.tiffSoft : C.badBg;
        rrect(ctx, bcx - BW / 2, cy - BH / 2, BW, BH, BH / 2);
        ctx.fill();

        ctx.font = `800 ${Math.min(32, BH * 0.52)}px "Noto Sans TC", sans-serif`;
        ctx.fillStyle = ch.improved ? C.tiffDeep : '#B04A5A';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const arrow = ch.improved ? '↓' : '↑';
        ctx.fillText(`${arrow} ${ch.pct.toFixed(1)}%`, bcx, cy + 1);
      } else {
        ctx.font = '400 34px "Noto Sans TC", sans-serif';
        ctx.fillStyle = '#CBDBD8';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('—', bcx, cy);
      }

      ctx.textAlign = 'left';
      y += ROW_H;
      rowIdx++;
    });
  });

  // ── Tagline block in remaining gap ──
  if (y < contentEnd) {
    const gapTop = y + 6;
    const gapH   = contentEnd - y - 6;
    if (gapH > 70) {
      // Decorative stars
      ctx.font = '28px sans-serif';
      ctx.fillStyle = C.tiff;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const mainSz = gapH > 180 ? (fmt === '4:5' ? 42 : 36)
                    : gapH > 130 ? 30
                    : 24;
      const attrSz = gapH > 180 ? 20 : gapH > 130 ? 16 : 13;

      const cxm = CX + CW / 2;
      const cym = gapTop + gapH / 2;

      // Little sparkles around
      ctx.fillStyle = C.tiff;
      ctx.font = `500 ${mainSz * 0.55}px sans-serif`;
      ctx.fillText('✦', cxm - 250, cym - mainSz * 0.3);
      ctx.fillText('✦', cxm + 250, cym - mainSz * 0.3);

      ctx.font = `700 ${mainSz}px "Noto Serif TC", serif`;
      ctx.fillStyle = C.tiffDeep;
      ctx.fillText('把你的心血管，交給專心的醫師。', cxm, cym - mainSz * 0.55);

      ctx.font = `500 ${attrSz}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = C.tiffDark;
      ctx.fillText('— 俠醫楊智鈞  ｜  富足診所', cxm, cym + mainSz * 0.55 + attrSz * 0.6);

      ctx.textAlign = 'left';
    }
  }

  // ── Footer (soft Tiffany bar, rounded bottom) ──
  const fy = CY + CH - FOOTER_H;
  ctx.fillStyle = C.tiffSoft;
  ctx.fillRect(CX, fy, CW, FOOTER_H);

  // Dashed decorative top border
  ctx.strokeStyle = C.tiff;
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 8]);
  ctx.beginPath();
  ctx.moveTo(CX + 20, fy);
  ctx.lineTo(CX + CW - 20, fy);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.font = '600 17px "Noto Sans TC", sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = C.tiffDeep;
  ctx.fillText('♡ 認同的話，幫我分享給更多人', CX + 36, fy + FOOTER_H / 2);

  ctx.textAlign = 'right';
  ctx.fillStyle = C.tiffDark;
  ctx.font = '700 17px "Noto Sans TC", sans-serif';
  ctx.fillText('@俠醫楊智鈞', CX + CW - 36, fy + FOOTER_H / 2);
  ctx.textAlign = 'left';

  ctx.restore();
}

// ─── Preview & Download ───────────────────────────────────────
const canvas = document.getElementById('previewCanvas');
const SCALE = 0.44;

function setFormat(f) {
  currentFormat = f;
  document.getElementById('btn11').classList.toggle('active', f === '1:1');
  document.getElementById('btn45').classList.toggle('active', f === '4:5');
  redraw();
}

async function redraw() {
  await document.fonts.ready;
  await logoPromise;
  drawCard(canvas, currentFormat);
  // Responsive scaling: mobile fits width; desktop uses fixed SCALE
  const isMobile = window.matchMedia('(max-width: 900px)').matches;
  if (isMobile) {
    const panel = document.querySelector('.preview-panel');
    const availW = panel.clientWidth - 24;
    const ratio = canvas.height / canvas.width;
    canvas.style.width  = availW + 'px';
    canvas.style.height = (availW * ratio) + 'px';
  } else {
    canvas.style.width  = (canvas.width  * SCALE) + 'px';
    canvas.style.height = (canvas.height * SCALE) + 'px';
  }
}

// Re-layout on resize / orientation change
window.addEventListener('resize', () => { redraw(); });

async function downloadCard() {
  await document.fonts.ready;
  await logoPromise;
  const exp = document.createElement('canvas');
  drawCard(exp, currentFormat);
  const name  = document.getElementById('patientName').value.trim();
  const fname = `血液淨化成效_${currentFormat.replace(':', 'x')}${name ? '_' + name : ''}.png`;
  exp.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname; a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

let t;
document.querySelectorAll('input').forEach(el =>
  el.addEventListener('input', () => { clearTimeout(t); t = setTimeout(redraw, 100); })
);


document.fonts.ready.then(redraw);
</script>
